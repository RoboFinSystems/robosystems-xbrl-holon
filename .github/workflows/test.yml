name: Test

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Run Tests
        run: |
          uv run pytest tests/ -v

      - name: Run Lint
        run: |
          uv run ruff check .

      - name: Run type checking
        run: |
          uv run basedpyright
